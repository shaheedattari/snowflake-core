name: snowflake-migration-demo

# Controls when the action will run.

on:
  push:
    branches:
      - main
    paths:
      - 'deploy/**'
  #workflow_dispatch:

jobs:
  deploy-dev:

    runs-on: ubuntu-latest

    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      TARGET_DATABASE: ${{ secrets.TARGET_DATABASE }}

    steps:
      - name: Debug Snowflake Account
        run: |
          echo "Account length = ${#SNOWFLAKE_ACCOUNT}"
          echo "User length = ${#SNOWFLAKE_USER}"
          echo "Acct name = ${{ secrets.SNOWFLAKE_ACCOUNT }}"
          
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Snowflake Connector
        run: |
          pip install snowflake-connector-python

      - name: Execute Deployment
        run: |
          python deploy.py
          echo "***End***"

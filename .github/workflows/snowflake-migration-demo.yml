name: snowflake-migration-demo

# Controls when the action will run.
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      TARGET_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Secrets
        run: |
          echo "Account Exists: ${{ secrets.SNOWFLAKE_ACCOUNT != '' }}"
          echo "User Exists: ${{ secrets.SNOWFLAKE_USER != '' }}"
          echo "Password Exists: ${{ secrets.SNOWFLAKE_PASSWORD != '' }}"
          echo "Role Exists: ${{ secrets.SNOWFLAKE_ROLE != '' }}"
          echo "Warehouse Exists: ${{ secrets.SNOWFLAKE_WAREHOUSE != '' }}"

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Snowflake Connector
        run: |
          pip install snowflake-connector-python

      - name: Execute Deployment
        run: |
          python deploy.py
          # echo "colpleted"
